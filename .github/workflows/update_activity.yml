name: Update Profile Activity

on:
  schedule:
    - cron: '0 * * * *' # Run hourly to sync cross-repo contributions
  workflow_dispatch:     # Allows manual triggering from Actions UI
  push:
    branches:
      - main
    paths-ignore:
      - 'assets/profile/activity.svg'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetch all history for accurate commit count

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate Activity SVG
        run: python3 scripts/update_activity.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/profile/activity.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update profile activity stats" && git push)
