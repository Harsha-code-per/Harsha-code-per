<svg xmlns="http://www.w3.org/2000/svg" width="180" height="20" viewBox="0 0 180 20" fill="none">
  <style>
    .wave {
      stroke-linecap: round;
      fill: none;
    }
    .wave-static {
      stroke: rgba(94, 106, 210, 0.15);
      stroke-width: 1;
    }
    .wave-active {
      stroke: #00f2fe;
      stroke-width: 1;
      opacity: 0.65;
      stroke-dasharray: 2 6;
      animation: wave-slide 4s linear infinite;
    }
    @keyframes wave-slide {
      0% { transform: translateX(0); }
      100% { transform: translateX(-60px); }
    }
  </style>
  <defs>
    <clipPath id="wave-clip">
      <rect width="180" height="20" />
    </clipPath>
  </defs>
  <g clip-path="url(#wave-clip)">
    <!-- Static baseline sinewave -->
    <path d="M 0 10 Q 15 5, 30 10 T 60 10 T 90 10 T 120 10 T 150 10 T 180 10" class="wave wave-static" />
    <!-- Active sliding sinewave -->
    <path d="M 0 10 Q 15 15, 30 10 T 60 10 T 90 10 T 120 10 T 150 10 T 180 10 T 210 10 T 240 10" class="wave wave-active" />
  </g>
</svg>
