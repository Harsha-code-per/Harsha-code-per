<svg xmlns="http://www.w3.org/2000/svg" width="800" height="130" viewBox="0 0 800 130" fill="none">
  <style>
    @keyframes lineFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .console-card {
      fill: #050508;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 1;
      rx: 6px;
    }
    .console-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      fill: #a1a1aa;
    }
    .command-text {
      fill: #00f2fe;
      font-weight: bold;
    }
    .accent-text {
      fill: #5e6ad2;
    }
    .cursor {
      animation: cursorBlink 1s step-end infinite;
      fill: #00f2fe;
    }
    .f-line {
      opacity: 0;
      animation: lineFade 0.3s ease-out forwards;
    }
    .line-1 { animation-delay: 0.1s; }
    .line-2 { animation-delay: 1.0s; }
    .line-3 { animation-delay: 1.6s; }
    .line-4 { animation-delay: 2.2s; }
  </style>
  
  <rect width="800" height="130" class="console-card" />
  
  <!-- Content -->
  <!-- Line 1: Command typed -->
  <g class="f-line line-1">
    <text x="20" y="35" class="console-text">
      guest@harsha:~# <tspan class="command-text">ssh telemetry.harshavardhan-k.me</tspan>
    </text>
  </g>
  
  <!-- Line 2: Handshake -->
  <g class="f-line line-2">
    <text x="20" y="55" class="console-text">
      Establishing encrypted websocket tunnel... <tspan class="accent-text">SUCCESS</tspan>
    </text>
  </g>
  
  <!-- Line 3: Host Key -->
  <g class="f-line line-3">
    <text x="20" y="75" class="console-text">
      Tunnel ID: <tspan fill="#e2e8f0">ssh-ed25519-SHA256:hrsh_k_auth_secure_link</tspan>
    </text>
  </g>
  
  <!-- Line 4: Final Connection -->
  <g class="f-line line-4">
    <text x="20" y="95" class="console-text">
      Status: <tspan fill="#10b981">Ready</tspan> | Terminal: <tspan class="accent-text">Active</tspan> | Listening for connections... <tspan class="cursor">_</tspan>
    </text>
  </g>
</svg>
