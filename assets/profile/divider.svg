<svg xmlns="http://www.w3.org/2000/svg" width="800" height="10" viewBox="0 0 800 10" fill="none">
  <style>
  <![CDATA[
    .track {
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 1;
    }
    .glowing-segment {
      stroke: #00f2fe;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 120 1600;
      animation: sweep 3s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 4px #00f2fe) drop-shadow(0 0 2px #6366f1);
    }
    @keyframes sweep {
      0% {
        stroke-dashoffset: 120;
      }
      100% {
        stroke-dashoffset: -800;
      }
    }
  ]]>
  </style>
  <!-- Background track line -->
  <line x1="0" y1="5" x2="800" y2="5" class="track" />
  <!-- Glowing sweeping segment -->
  <line x1="0" y1="5" x2="800" y2="5" class="glowing-segment" />
</svg>
