<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80" fill="none">
  <style>
    .signature-path {
      stroke: url(#sig-grad);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: draw-loop 6s cubic-bezier(0.42, 0, 0.58, 1) infinite;
    }
    @keyframes draw-loop {
      0% {
        stroke-dashoffset: 800;
        opacity: 0;
      }
      5% {
        opacity: 1;
      }
      40% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
      85% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
      95%, 100% {
        stroke-dashoffset: 0;
        opacity: 0;
      }
    }
  </style>
  <defs>
    <linearGradient id="sig-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5e6ad2" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
  </defs>
  <!-- Stylized H.K / Harsha Signature Path -->
  <path d="M 30 55 C 30 15, 55 10, 45 45 C 40 60, 35 65, 50 55 C 65 45, 80 20, 75 45 C 72 55, 68 62, 85 55 C 100 48, 105 38, 100 55 C 98 62, 108 58, 115 50 C 122 42, 128 35, 125 55 C 123 63, 133 58, 142 50 C 150 42, 155 35, 152 55 C 150 63, 160 55, 170 45 M 65 38 C 50 38, 85 38, 85 38 M 190 20 L 180 65 M 180 42 L 205 32 M 182 45 L 210 65" class="signature-path" />
</svg>
