<svg xmlns="http://www.w3.org/2000/svg" width="100" height="20" viewBox="0 0 100 20" fill="none">
  <style>
  <![CDATA[
    .node {
      fill: #00f2fe;
      animation: glow 2s infinite ease-in-out;
    }
    .node:nth-child(2) { animation-delay: 0.5s; }
    .node:nth-child(3) { animation-delay: 1s; }
    .node:nth-child(4) { animation-delay: 1.5s; }
    .link {
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 1;
    }
    @keyframes glow {
      0%, 100% { r: 1.5; opacity: 0.3; }
      50% { r: 3; opacity: 1; filter: drop-shadow(0 0 2px #00f2fe); }
    }
  ]]>
  </style>
  <line x1="10" y1="10" x2="90" y2="10" class="link" />
  <circle cx="10" cy="10" r="1.5" class="node" />
  <circle cx="36" cy="10" r="1.5" class="node" />
  <circle cx="63" cy="10" r="1.5" class="node" />
  <circle cx="90" cy="10" r="1.5" class="node" />
</svg>
