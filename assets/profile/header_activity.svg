<svg xmlns="http://www.w3.org/2000/svg" width="100" height="20" viewBox="0 0 100 20" fill="none">
  <style>
  <![CDATA[
    .bar {
      fill: #00f2fe;
      filter: drop-shadow(0 0 1.5px #00f2fe);
    }
  ]]>
  </style>
  <rect x="38" y="4" width="3" height="12" rx="0.5" class="bar">
    <animate attributeName="height" values="4;14;4" dur="1.2s" repeatCount="indefinite" />
    <animate attributeName="y" values="14;4;14" dur="1.2s" repeatCount="indefinite" />
  </rect>
  <rect x="46" y="2" width="3" height="14" rx="0.5" class="bar">
    <animate attributeName="height" values="6;16;6" dur="0.8s" repeatCount="indefinite" />
    <animate attributeName="y" values="12;2;12" dur="0.8s" repeatCount="indefinite" />
  </rect>
  <rect x="54" y="6" width="3" height="10" rx="0.5" class="bar">
    <animate attributeName="height" values="2;12;2" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="y" values="16;6;16" dur="1.5s" repeatCount="indefinite" />
  </rect>
</svg>
