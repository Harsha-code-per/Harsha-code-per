<svg xmlns="http://www.w3.org/2000/svg" width="800" height="140" viewBox="0 0 800 140" fill="none">
  <style>
    @keyframes horizon-glow {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 0.95; }
    }
    .horizon-line {
      stroke: url(#horizon-line-grad);
      stroke-width: 1.5;
    }
    .grid-v {
      stroke: rgba(94, 106, 210, 0.08);
      stroke-width: 0.8;
    }
    .glow-rect {
      fill: url(#horizon-glow-grad);
      animation: horizon-glow 4s ease-in-out infinite;
    }
  </style>
  <defs>
    <radialGradient id="horizon-glow-grad" cx="50%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.22" />
      <stop offset="50%" stop-color="#5e6ad2" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#050508" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="horizon-line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5e6ad2" stop-opacity="0" />
      <stop offset="50%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#5e6ad2" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="800" height="140" fill="#050508" />
  <rect width="800" height="140" class="glow-rect" />

  <!-- Perspective Vertical Lines converging at (400, 15) -->
  <line x1="400" y1="15" x2="-200" y2="140" class="grid-v" />
  <line x1="400" y1="15" x2="-50" y2="140" class="grid-v" />
  <line x1="400" y1="15" x2="100" y2="140" class="grid-v" />
  <line x1="400" y1="15" x2="250" y2="140" class="grid-v" />
  <line x1="400" y1="15" x2="330" y2="140" class="grid-v" />
  <line x1="400" y1="15" x2="400" y2="140" class="grid-v" stroke-width="1.2" stroke="rgba(0, 242, 254, 0.2)" />
  <line x1="400" y1="15" x2="470" y2="140" class="grid-v" />
  <line x1="400" y1="15" x2="550" y2="140" class="grid-v" />
  <line x1="400" y1="15" x2="700" y2="140" class="grid-v" />
  <line x1="400" y1="15" x2="850" y2="140" class="grid-v" />
  <line x1="400" y1="15" x2="1000" y2="140" class="grid-v" />

  <!-- Horizon Line -->
  <line x1="0" y1="15" x2="800" y2="15" class="horizon-line" />

  <!-- Perspective Horizontal lines moving forward in perfect loop -->
  <g>
    <path d="M 0 15 L 800 15" stroke="rgba(94, 106, 210, 0.05)" stroke-width="0.8">
      <animate attributeName="d" from="M 0 15 L 800 15" to="M 0 35 L 800 35" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M 0 35 L 800 35" stroke="rgba(94, 106, 210, 0.08)" stroke-width="0.9">
      <animate attributeName="d" from="M 0 35 L 800 35" to="M 0 65 L 800 65" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M 0 65 L 800 65" stroke="rgba(94, 106, 210, 0.12)" stroke-width="1.0">
      <animate attributeName="d" from="M 0 65 L 800 65" to="M 0 105 L 800 105" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M 0 105 L 800 105" stroke="rgba(94, 106, 210, 0.15)" stroke-width="1.2">
      <animate attributeName="d" from="M 0 105 L 800 105" to="M 0 155 L 800 155" dur="3s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Glowing center horizon beacon -->
  <circle cx="400" cy="15" r="2.5" fill="#00f2fe">
    <animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
