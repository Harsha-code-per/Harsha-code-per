<svg xmlns="http://www.w3.org/2000/svg" width="300" height="550" viewBox="0 0 300 550" fill="none">
  <style>
  <![CDATA[
    .panel-bg {
      fill: #060913;
      stroke: rgba(0, 242, 254, 0.15);
      stroke-width: 1;
    }
    .panel-header {
      font-family: monospace;
      font-size: 10px;
      fill: #71717a;
      letter-spacing: 1px;
      font-weight: bold;
    }
    .node {
      fill: #00f2fe;
      stroke: #060913;
      stroke-width: 2;
      filter: drop-shadow(0 0 3px #00f2fe);
    }
    .net-line {
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 1;
    }
    .signal {
      fill: #00f2fe;
      filter: drop-shadow(0 0 2px #00f2fe);
    }
    .matrix-cell {
      fill: #00f2fe;
      animation: cellPulse 2s infinite ease-in-out;
    }
    .cell-1 { animation-delay: 0.1s; }
    .cell-2 { animation-delay: 0.4s; }
    .cell-3 { animation-delay: 0.7s; }
    .cell-4 { animation-delay: 1.1s; }
    .cell-5 { animation-delay: 1.5s; }
    
    @keyframes cellPulse {
      0%, 100% { opacity: 0.05; fill: rgba(255,255,255,0.05); }
      50% { opacity: 0.9; fill: #00f2fe; filter: drop-shadow(0 0 2px #00f2fe); }
    }
    .log-text {
      font-family: monospace;
      font-size: 10px;
      fill: #10b981;
      letter-spacing: 0.5px;
    }
    .log-warn {
      fill: #eab308;
    }
    .corner-bracket {
      stroke: #00f2fe;
      stroke-width: 1.5;
    }
  ]]>
  </style>

  <!-- Main System Console Panel -->
  <rect x="5" y="5" width="290" height="540" rx="6" class="panel-bg" />
  
  <!-- Glowing bracket corner decorations -->
  <path d="M 12 5 L 5 5 L 5 12" fill="none" class="corner-bracket" />
  <path d="M 288 5 L 295 5 L 295 12" fill="none" class="corner-bracket" />
  <path d="M 12 545 L 5 545 L 5 538" fill="none" class="corner-bracket" />
  <path d="M 288 545 L 295 545 L 295 538" fill="none" class="corner-bracket" />

  <!-- SECTION 1: NEURAL INTERACTION NET -->
  <text x="20" y="30" class="panel-header">NEURAL FLOW // COGNITIVE LAB</text>
  <line x1="20" y1="36" x2="280" y2="36" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  
  <!-- Network Mesh -->
  <line x1="50" y1="100" x2="150" y2="60" class="net-line" />
  <line x1="50" y1="100" x2="150" y2="140" class="net-line" />
  <line x1="150" y1="60" x2="250" y2="100" class="net-line" />
  <line x1="150" y1="140" x2="250" y2="100" class="net-line" />
  <line x1="150" y1="60" x2="150" y2="140" class="net-line" />

  <!-- Glowing Signal Packets traveling along lines -->
  <circle cx="0" cy="0" r="2.5" class="signal">
    <animateMotion path="M 50 100 L 150 60" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="0" cy="0" r="2.5" class="signal">
    <animateMotion path="M 50 100 L 150 140" dur="2.7s" repeatCount="indefinite" />
  </circle>
  <circle cx="0" cy="0" r="2.5" class="signal">
    <animateMotion path="M 150 60 L 250 100" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="0" cy="0" r="2.5" class="signal">
    <animateMotion path="M 150 140 L 250 100" dur="2.3s" repeatCount="indefinite" />
  </circle>

  <!-- Mesh Nodes -->
  <circle cx="50" cy="100" r="4.5" class="node" />
  <circle cx="150" cy="60" r="4.5" class="node" />
  <circle cx="150" cy="140" r="4.5" class="node" />
  <circle cx="250" cy="100" r="4.5" class="node" />

  <!-- SECTION 2: ACTIVATION MATRIX -->
  <text x="20" y="200" class="panel-header">WEIGHTS ACTIVATION MATRIX</text>
  <line x1="20" y1="206" x2="280" y2="206" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- Shimmering Grid -->
  <g transform="translate(30, 220)">
    <!-- Column 0 -->
    <rect x="0" y="0" width="18" height="12" rx="1" class="matrix-cell cell-1" />
    <rect x="0" y="16" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <rect x="0" y="32" width="18" height="12" rx="1" class="matrix-cell cell-2" />
    <rect x="0" y="48" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <rect x="0" y="64" width="18" height="12" rx="1" class="matrix-cell cell-4" />
    <!-- Column 1 -->
    <rect x="24" y="0" width="18" height="12" rx="1" class="matrix-cell cell-4" />
    <rect x="24" y="16" width="18" height="12" rx="1" class="matrix-cell cell-1" />
    <rect x="24" y="32" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <rect x="24" y="48" width="18" height="12" rx="1" class="matrix-cell cell-2" />
    <rect x="24" y="64" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <!-- Column 2 -->
    <rect x="48" y="0" width="18" height="12" rx="1" class="matrix-cell cell-2" />
    <rect x="48" y="16" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <rect x="48" y="32" width="18" height="12" rx="1" class="matrix-cell cell-1" />
    <rect x="48" y="48" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <rect x="48" y="64" width="18" height="12" rx="1" class="matrix-cell cell-4" />
    <!-- Column 3 -->
    <rect x="72" y="0" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <rect x="72" y="16" width="18" height="12" rx="1" class="matrix-cell cell-2" />
    <rect x="72" y="32" width="18" height="12" rx="1" class="matrix-cell cell-4" />
    <rect x="72" y="48" width="18" height="12" rx="1" class="matrix-cell cell-1" />
    <rect x="72" y="64" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <!-- Column 4 -->
    <rect x="96" y="0" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <rect x="96" y="16" width="18" height="12" rx="1" class="matrix-cell cell-4" />
    <rect x="96" y="32" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <rect x="96" y="48" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <rect x="96" y="64" width="18" height="12" rx="1" class="matrix-cell cell-2" />
    <!-- Column 5 -->
    <rect x="120" y="0" width="18" height="12" rx="1" class="matrix-cell cell-1" />
    <rect x="120" y="16" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <rect x="120" y="32" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <rect x="120" y="48" width="18" height="12" rx="1" class="matrix-cell cell-4" />
    <rect x="120" y="64" width="18" height="12" rx="1" class="matrix-cell cell-1" />
    <!-- Column 6 -->
    <rect x="144" y="0" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <rect x="144" y="16" width="18" height="12" rx="1" class="matrix-cell cell-1" />
    <rect x="144" y="32" width="18" height="12" rx="1" class="matrix-cell cell-2" />
    <rect x="144" y="48" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <rect x="144" y="64" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <!-- Column 7 -->
    <rect x="168" y="0" width="18" height="12" rx="1" class="matrix-cell cell-2" />
    <rect x="168" y="16" width="18" height="12" rx="1" class="matrix-cell cell-4" />
    <rect x="168" y="32" width="18" height="12" rx="1" class="matrix-cell cell-1" />
    <rect x="168" y="48" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <rect x="168" y="64" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <!-- Column 8 -->
    <rect x="192" y="0" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <rect x="192" y="16" width="18" height="12" rx="1" class="matrix-cell cell-2" />
    <rect x="192" y="32" width="18" height="12" rx="1" class="matrix-cell cell-4" />
    <rect x="192" y="48" width="18" height="12" rx="1" class="matrix-cell cell-1" />
    <rect x="192" y="64" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <!-- Column 9 -->
    <rect x="216" y="0" width="18" height="12" rx="1" class="matrix-cell cell-4" />
    <rect x="216" y="16" width="18" height="12" rx="1" class="matrix-cell cell-5" />
    <rect x="216" y="32" width="18" height="12" rx="1" class="matrix-cell cell-2" />
    <rect x="216" y="48" width="18" height="12" rx="1" class="matrix-cell cell-3" />
    <rect x="216" y="64" width="18" height="12" rx="1" class="matrix-cell cell-1" />
  </g>

  <!-- SECTION 3: SYSTEM CONSOLE LOG STREAM -->
  <text x="20" y="350" class="panel-header">SYS_LOG // EXECUTOR_TELEMETRY</text>
  <line x1="20" y1="356" x2="280" y2="356" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  
  <!-- Mask Viewport to clip scrolling log text -->
  <defs>
    <clipPath id="console-clip">
      <rect x="20" y="375" width="260" height="150" />
    </clipPath>
  </defs>

  <!-- Console Window Box -->
  <rect x="18" y="370" width="264" height="160" rx="4" fill="#04060c" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />

  <!-- Scrolling Logs Group -->
  <g clip-path="url(#console-clip)">
    <g>
      <!-- Infinite upward translate loop -->
      <animateTransform attributeName="transform" type="translate" from="0 140" to="0 -180" dur="10s" repeatCount="indefinite" />
      
      <text x="30" y="20" class="log-text">[ OK ] BOOTSTRAP BillyOS_v1.0</text>
      <text x="30" y="40" class="log-text">[ OK ] E2E_CRYPTO_KEYPAIR_GEN</text>
      <text x="30" y="60" class="log-text">[ OK ] SQLite_OFFLINE_DB_READY</text>
      <text x="30" y="80" class="log-text log-warn">[ WARN] SYNC_CONN_TIMEOUT: RETRYING</text>
      <text x="30" y="100" class="log-text">[ RUN ] POLLING UPI_GATEWAY_WEBHOOKS</text>
      <text x="30" y="120" class="log-text">[ OK ] E2E_SOCKET_ESTABLISHED</text>
      <text x="30" y="140" class="log-text">[ OK ] SECURECHAT_MVP_SESSION_OPEN</text>
      <text x="30" y="160" class="log-text">[ RUN ] LOAD_MODEL_WEIGHTS: SUCCESS</text>
      <text x="30" y="180" class="log-text">[ OK ] INTENT_ROUTER_ONLINE</text>
      <text x="30" y="200" class="log-text">[ OK ] VOICE_INFERENCE_ENGINE_200</text>
      <text x="30" y="220" class="log-text">[ OK ] TELEMETRY_STATE_RESOLVED</text>
      <text x="30" y="240" class="log-text">[ OK ] SYS_PULSE_200_OK_END</text>
    </g>
  </g>
</svg>
