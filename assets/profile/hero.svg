<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" fill="none" class="hero-svg">
  <style>
    .grid { stroke: rgba(255, 255, 255, 0.015); stroke-width: 0.8; }
    .blueprint-border { stroke: rgba(255, 255, 255, 0.06); stroke-width: 1; }
    .connection-line {
      stroke: rgba(94, 106, 210, 0.2);
      stroke-width: 1.5;
      transition: stroke 0.3s ease, stroke-width 0.3s ease;
    }
    .node-group {
      cursor: pointer;
    }
    .node-bg {
      fill: #050508;
      stroke: #27272a;
      stroke-width: 1.5;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .node-label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      font-weight: bold;
      fill: #71717a;
      text-anchor: middle;
      transition: fill 0.3s ease;
      pointer-events: none;
    }
    
    /* Interactive States */
    .node-group:hover .node-bg {
      stroke: #00f2fe;
      fill: rgba(0, 242, 254, 0.04);
      filter: drop-shadow(0 0 6px rgba(0, 242, 254, 0.4));
      transform: translateY(-3px);
    }
    .node-group:hover .node-label {
      fill: #ffffff;
    }
    
    /* Connection lines glow when adjacent nodes are hovered */
    .hero-svg:has(#ng-ai:hover) .l-ab { stroke: #00f2fe; stroke-width: 2; }
    .hero-svg:has(#ng-backend:hover) .l-ab { stroke: #00f2fe; stroke-width: 2; }
    .hero-svg:has(#ng-backend:hover) .l-bc { stroke: #5e6ad2; stroke-width: 2; }
    .hero-svg:has(#ng-db:hover) .l-bc { stroke: #5e6ad2; stroke-width: 2; }
    .hero-svg:has(#ng-db:hover) .l-cd { stroke: #5e6ad2; stroke-width: 2; }
    .hero-svg:has(#ng-ui:hover) .l-cd { stroke: #5e6ad2; stroke-width: 2; }
    .hero-svg:has(#ng-ui:hover) .l-de { stroke: #00f2fe; stroke-width: 2; }
    .hero-svg:has(#ng-motion:hover) .l-de { stroke: #00f2fe; stroke-width: 2; }
    
    /* Tooltip panel logic */
    .info-panel {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      fill: #52525b;
      text-anchor: middle;
      transition: opacity 0.2s ease, fill 0.2s ease;
    }
    .default-info {
      opacity: 1;
      fill: #71717a;
    }
    .hover-info {
      opacity: 0;
      pointer-events: none;
      font-weight: bold;
    }
    
    /* Show specific tooltips when hovering over nodes */
    .hero-svg:has(#ng-ai:hover) .default-info { opacity: 0; }
    .hero-svg:has(#ng-ai:hover) #info-ai { opacity: 1; fill: #00f2fe; }
    
    .hero-svg:has(#ng-backend:hover) .default-info { opacity: 0; }
    .hero-svg:has(#ng-backend:hover) #info-backend { opacity: 1; fill: #5e6ad2; }
    
    .hero-svg:has(#ng-db:hover) .default-info { opacity: 0; }
    .hero-svg:has(#ng-db:hover) #info-db { opacity: 1; fill: #5e6ad2; }
    
    .hero-svg:has(#ng-ui:hover) .default-info { opacity: 0; }
    .hero-svg:has(#ng-ui:hover) #info-ui { opacity: 1; fill: #ffffff; }
    
    .hero-svg:has(#ng-motion:hover) .default-info { opacity: 0; }
    .hero-svg:has(#ng-motion:hover) #info-motion { opacity: 1; fill: #00f2fe; }
  </style>

  <rect width="800" height="200" fill="#050508" stroke="rgba(255, 255, 255, 0.04)" rx="6" />

  <!-- Graph grid background -->
  <g>
    <line x1="100" y1="0" x2="100" y2="200" class="grid" />
    <line x1="200" y1="0" x2="200" y2="200" class="grid" />
    <line x1="300" y1="0" x2="300" y2="200" class="grid" />
    <line x1="400" y1="0" x2="400" y2="200" class="grid" />
    <line x1="500" y1="0" x2="500" y2="200" class="grid" />
    <line x1="600" y1="0" x2="600" y2="200" class="grid" />
    <line x1="700" y1="0" x2="700" y2="200" class="grid" />
    
    <line x1="0" y1="40" x2="800" y2="40" class="grid" />
    <line x1="0" y1="80" x2="800" y2="80" class="grid" />
    <line x1="0" y1="120" x2="800" y2="120" class="grid" />
    <line x1="0" y1="160" x2="800" y2="160" class="grid" />
  </g>

  <!-- Technical borders -->
  <path d="M 8 8 L 20 8 M 8 8 L 8 20" class="blueprint-border" />
  <path d="M 792 8 L 780 8 M 792 8 L 792 20" class="blueprint-border" />
  <path d="M 8 192 L 20 192 M 8 192 L 8 180" class="blueprint-border" />
  <path d="M 792 192 L 780 192 M 792 192 L 792 180" class="blueprint-border" />

  <!-- Connection Lines between nodes -->
  <line x1="150" y1="70" x2="275" y2="70" class="connection-line l-ab" />
  <line x1="275" y1="70" x2="400" y2="70" class="connection-line l-bc" />
  <line x1="400" y1="70" x2="525" y2="70" class="connection-line l-cd" />
  <line x1="525" y1="70" x2="650" y2="70" class="connection-line l-de" />

  <!-- Interactive Node Groups -->
  <!-- Node A: AI -->
  <g class="node-group" id="ng-ai" transform="translate(0, 0)">
    <circle cx="150" cy="70" r="22" class="node-bg" />
    <text x="150" y="74" class="node-label">AI</text>
  </g>

  <!-- Node B: Backend -->
  <g class="node-group" id="ng-backend" transform="translate(0, 0)">
    <circle cx="275" cy="70" r="22" class="node-bg" />
    <text x="275" y="74" class="node-label">BACKEND</text>
  </g>

  <!-- Node C: DB -->
  <g class="node-group" id="ng-db" transform="translate(0, 0)">
    <circle cx="400" cy="70" r="22" class="node-bg" />
    <text x="400" y="74" class="node-label">DATASTORE</text>
  </g>

  <!-- Node D: UI -->
  <g class="node-group" id="ng-ui" transform="translate(0, 0)">
    <circle cx="525" cy="70" r="22" class="node-bg" />
    <text x="525" y="74" class="node-label">SURFACE</text>
  </g>

  <!-- Node E: Motion -->
  <g class="node-group" id="ng-motion" transform="translate(0, 0)">
    <circle cx="650" cy="70" r="22" class="node-bg" />
    <text x="650" y="74" class="node-label">MOTION</text>
  </g>

  <!-- Info Panel / Display Board -->
  <rect x="150" y="140" width="500" height="32" fill="#050508" stroke="rgba(255, 255, 255, 0.04)" rx="4" />
  
  <text x="400" y="159" class="info-panel default-info">&gt; HOVER OVER ANY NODE TO INSPECT EXPERTISE PARAMETERS</text>
  
  <text x="400" y="159" class="info-panel hover-info" id="info-ai">&gt; AI: INTEGRATING TENSORS, MODEL CASCADE FALLBACKS, AND AGENT WORKFLOWS</text>
  <text x="400" y="159" class="info-panel hover-info" id="info-backend">&gt; BACKEND: LOW-LATENCY REST, WEBSOCKET STREAMS, AND WEBRTC CHANNELS</text>
  <text x="400" y="159" class="info-panel hover-info" id="info-db">&gt; DATASTORE: TRANSACTION SCALING, CACHE LAYERING, AND VECTOR DATABASES</text>
  <text x="400" y="159" class="info-panel hover-info" id="info-ui">&gt; SURFACE: NEXT.JS APP CHOREOGRAPHY, THREE.JS, AND WEBGL VIEWPORT SCENES</text>
  <text x="400" y="159" class="info-panel hover-info" id="info-motion">&gt; MOTION: COMMUNICATIONS THROUGH EXPLAINABLE PHYSICS AND SYSTEM TRANSITIONS</text>
</svg>
