<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220" fill="none">
  <style>
    .grid { stroke: rgba(255, 255, 255, 0.015); stroke-width: 0.8; }
    .blueprint-line { stroke: rgba(255, 255, 255, 0.08); stroke-width: 1; }
    .blueprint-line-glow { stroke: #5e6ad2; stroke-width: 1.2; opacity: 0.4; }
    .node {
      fill: #050508;
      stroke: #71717a;
      stroke-width: 1.2;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      transform-origin: center;
    }
    .node:hover {
      stroke: #00f2fe;
      fill: rgba(0, 242, 254, 0.1);
      filter: drop-shadow(0 0 6px rgba(0, 242, 254, 0.6));
    }
    .node-input:hover {
      transform: scale(1.2);
    }
    .flow-line {
      stroke: #5e6ad2;
      stroke-width: 1.5;
      stroke-dasharray: 6 24;
      animation: signal-flow 6s linear infinite;
    }
    .flow-line:hover {
      stroke: #00f2fe;
      stroke-width: 2;
      animation-duration: 2s;
      filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.5));
    }
    @keyframes signal-flow {
      to {
        stroke-dashoffset: -120;
      }
    }
    .label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 9px;
      fill: #71717a;
      transition: fill 0.3s ease;
    }
    .label-group:hover .label {
      fill: #ffffff;
    }
    .box {
      fill: #050508;
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 1;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .box:hover {
      stroke: #5e6ad2;
      fill: rgba(94, 106, 210, 0.05);
      filter: drop-shadow(0 0 8px rgba(94, 106, 210, 0.3));
    }
  </style>
  
  <rect width="800" height="220" fill="#050508" stroke="rgba(255, 255, 255, 0.04)" rx="6" />

  <!-- Graph Paper Grid -->
  <line x1="40" y1="0" x2="40" y2="220" class="grid" />
  <line x1="80" y1="0" x2="80" y2="220" class="grid" />
  <line x1="120" y1="0" x2="120" y2="220" class="grid" />
  <line x1="160" y1="0" x2="160" y2="220" class="grid" />
  <line x1="200" y1="0" x2="200" y2="220" class="grid" />
  <line x1="240" y1="0" x2="240" y2="220" class="grid" />
  <line x1="280" y1="0" x2="280" y2="220" class="grid" />
  <line x1="320" y1="0" x2="320" y2="220" class="grid" />
  <line x1="360" y1="0" x2="360" y2="220" class="grid" />
  <line x1="400" y1="0" x2="400" y2="220" class="grid" />
  <line x1="440" y1="0" x2="440" y2="220" class="grid" />
  <line x1="480" y1="0" x2="480" y2="220" class="grid" />
  <line x1="520" y1="0" x2="520" y2="220" class="grid" />
  <line x1="560" y1="0" x2="560" y2="220" class="grid" />
  <line x1="600" y1="0" x2="600" y2="220" class="grid" />
  <line x1="640" y1="0" x2="640" y2="220" class="grid" />
  <line x1="680" y1="0" x2="680" y2="220" class="grid" />
  <line x1="720" y1="0" x2="720" y2="220" class="grid" />
  <line x1="760" y1="0" x2="760" y2="220" class="grid" />

  <line x1="0" y1="20" x2="800" y2="20" class="grid" />
  <line x1="0" y1="40" x2="800" y2="40" class="grid" />
  <line x1="0" y1="60" x2="800" y2="60" class="grid" />
  <line x1="0" y1="80" x2="800" y2="80" class="grid" />
  <line x1="0" y1="100" x2="800" y2="100" class="grid" />
  <line x1="0" y1="120" x2="800" y2="120" class="grid" />
  <line x1="0" y1="140" x2="800" y2="140" class="grid" />
  <line x1="0" y1="160" x2="800" y2="160" class="grid" />
  <line x1="0" y1="180" x2="800" y2="180" class="grid" />
  <line x1="0" y1="200" x2="800" y2="200" class="grid" />

  <!-- Technical Sketch Borders -->
  <path d="M 10 10 L 25 10 M 10 10 L 10 25" class="blueprint-line" />
  <path d="M 790 10 L 775 10 M 790 10 L 790 25" class="blueprint-line" />
  <path d="M 10 210 L 25 210 M 10 210 L 10 195" class="blueprint-line" />
  <path d="M 790 210 L 775 210 M 790 210 L 790 195" class="blueprint-line" />

  <!-- Neural Cluster Connections -->
  <line x1="60" y1="70" x2="130" y2="50" class="blueprint-line" stroke-opacity="0.5" />
  <line x1="60" y1="70" x2="130" y2="110" class="blueprint-line" stroke-opacity="0.5" />
  <line x1="60" y1="150" x2="130" y2="110" class="blueprint-line" stroke-opacity="0.5" />
  <line x1="60" y1="150" x2="130" y2="170" class="blueprint-line" stroke-opacity="0.5" />

  <line x1="130" y1="50" x2="200" y2="80" class="blueprint-line" stroke-opacity="0.5" />
  <line x1="130" y1="110" x2="200" y2="80" class="blueprint-line" stroke-opacity="0.5" />
  <line x1="130" y1="110" x2="200" y2="140" class="blueprint-line" stroke-opacity="0.5" />
  <line x1="130" y1="170" x2="200" y2="140" class="blueprint-line" stroke-opacity="0.5" />

  <!-- Nodes -->
  <circle cx="60" cy="70" r="6" class="node node-input" style="transform-origin: 60px 70px;" />
  <circle cx="60" cy="150" r="6" class="node node-input" style="transform-origin: 60px 150px;" />

  <circle cx="130" cy="50" r="6" class="node node-input" style="transform-origin: 130px 50px;" />
  <circle cx="130" cy="110" r="6" class="node node-input" style="transform-origin: 130px 110px;" />
  <circle cx="130" cy="170" r="6" class="node node-input" style="transform-origin: 130px 170px;" />

  <circle cx="200" cy="80" r="6" class="node node-input" style="transform-origin: 200px 80px;" />
  <circle cx="200" cy="140" r="6" class="node node-input" style="transform-origin: 200px 140px;" />

  <!-- Data Flow Pipelines -->
  <path d="M 206 80 L 320 80" class="blueprint-line-glow" />
  <path d="M 206 80 L 320 80" class="flow-line" />
  
  <path d="M 206 140 Q 260 140, 260 110 T 320 110" class="blueprint-line-glow" />
  <path d="M 206 140 Q 260 140, 260 110 T 320 110" class="flow-line" />

  <!-- Middle: System Core Processing Block -->
  <g class="label-group">
    <rect x="320" y="60" width="160" height="100" class="box" rx="4" />
    <text x="400" y="90" text-anchor="middle" class="label" fill="#ffffff" font-weight="bold">AI-NATIVE ENGINE</text>
    <text x="400" y="110" text-anchor="middle" class="label">STREAM_LATENCY: <tspan fill="#00f2fe">&lt;10ms</tspan></text>
    <text x="400" y="130" text-anchor="middle" class="label" font-size="8px">MODEL_CASCADE: STANDBY</text>
    <line x1="340" y1="145" x2="460" y2="145" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  </g>

  <!-- Flow out to Datastore and Client Interface -->
  <path d="M 480 90 L 580 90" class="blueprint-line-glow" />
  <path d="M 480 90 L 580 90" class="flow-line" />
  
  <path d="M 480 130 L 580 130" class="blueprint-line-glow" />
  <path d="M 480 130 L 580 130" class="flow-line" />

  <!-- Right Side: Database Block -->
  <g class="label-group">
    <rect x="580" y="55" width="140" height="50" class="box" rx="4" />
    <text x="650" y="75" text-anchor="middle" class="label" fill="#ffffff">DISTRIBUTED_DB</text>
    <text x="650" y="90" text-anchor="middle" class="label" font-size="8px">REPLICATION_FACTOR: 3</text>
  </g>

  <!-- Right Side: Interface Block -->
  <g class="label-group">
    <rect x="580" y="115" width="140" height="50" class="box" rx="4" />
    <text x="650" y="135" text-anchor="middle" class="label" fill="#ffffff">IMMERSIVE_UI</text>
    <text x="650" y="150" text-anchor="middle" class="label" font-size="8px">RENDER_PIPELINE: WebGL</text>
  </g>

  <!-- Text Annotations -->
  <text x="20" y="200" font-family="ui-monospace, SFMono-Regular, monospace" font-size="8px" fill="rgba(255, 255, 255, 0.15)">LOC: 12.97° N, 80.24° E</text>
  <text x="780" y="200" text-anchor="end" font-family="ui-monospace, SFMono-Regular, monospace" font-size="8px" fill="rgba(255, 255, 255, 0.15)">SYSTEM_STATE: STABLE</text>
</svg>
