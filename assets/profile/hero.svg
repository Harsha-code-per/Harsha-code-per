<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" fill="none">
  <style>
    .grid { stroke: rgba(255, 255, 255, 0.03); stroke-width: 0.8; }
    .blueprint-border { stroke: rgba(255, 255, 255, 0.15); stroke-width: 1; }
    
    .connection-line {
      stroke: #334155;
      stroke-width: 2;
      transition: all 0.3s ease;
    }
    
    .node-group {
      cursor: pointer;
    }
    .node-bg {
      fill: #09090b;
      stroke: #475569;
      stroke-width: 2;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .node-label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      font-weight: bold;
      fill: #cbd5e1;
      text-anchor: middle;
      transition: fill 0.3s ease;
      pointer-events: none;
    }
    
    /* Dedicated tooltips inside the groups */
    .info-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      fill: #00f2fe;
      font-weight: bold;
      text-anchor: middle;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    
    /* Interactive Hover States */
    .node-group:hover .node-bg {
      stroke: #00f2fe;
      fill: #00f2fe;
      filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.8));
      transform: translateY(-3px);
    }
    .node-group:hover .node-label {
      fill: #050508;
    }
    
    /* Display the custom info text when the group is hovered */
    .node-group:hover .info-text {
      opacity: 1;
    }
    
    /* Connection lines flow and glow when hovering adjacent groups */
    /* To make lines highlight, we can target them via sibling hover rules */
    #ng-ai:hover ~ .l-ab { stroke: #00f2fe; stroke-width: 3; }
    #ng-backend:hover ~ .l-ab { stroke: #00f2fe; stroke-width: 3; }
    #ng-backend:hover ~ .l-bc { stroke: #6366f1; stroke-width: 3; }
    #ng-db:hover ~ .l-bc { stroke: #6366f1; stroke-width: 3; }
    #ng-db:hover ~ .l-cd { stroke: #6366f1; stroke-width: 3; }
    #ng-ui:hover ~ .l-cd { stroke: #6366f1; stroke-width: 3; }
    #ng-ui:hover ~ .l-de { stroke: #00f2fe; stroke-width: 3; }
    #ng-motion:hover ~ .l-de { stroke: #00f2fe; stroke-width: 3; }
    
    /* Default board text */
    .info-text-default {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      fill: #94a3b8;
      text-anchor: middle;
      opacity: 1;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    
    /* Hide the default description text when ANY group is hovered */
    .node-group:hover ~ .info-text-default {
      opacity: 0;
    }
  </style>

  <rect width="800" height="200" fill="#050508" stroke="rgba(255, 255, 255, 0.08)" rx="6" />

  <!-- Graph grid background -->
  <g>
    <line x1="100" y1="0" x2="100" y2="200" class="grid" />
    <line x1="200" y1="0" x2="200" y2="200" class="grid" />
    <line x1="300" y1="0" x2="300" y2="200" class="grid" />
    <line x1="400" y1="0" x2="400" y2="200" class="grid" />
    <line x1="500" y1="0" x2="500" y2="200" class="grid" />
    <line x1="600" y1="0" x2="600" y2="200" class="grid" />
    <line x1="700" y1="0" x2="700" y2="200" class="grid" />
    
    <line x1="0" y1="40" x2="800" y2="40" class="grid" />
    <line x1="0" y1="80" x2="800" y2="80" class="grid" />
    <line x1="0" y1="120" x2="800" y2="120" class="grid" />
    <line x1="0" y1="160" x2="800" y2="160" class="grid" />
  </g>

  <!-- Technical borders -->
  <path d="M 8 8 L 20 8 M 8 8 L 8 20" class="blueprint-border" />
  <path d="M 792 8 L 780 8 M 792 8 L 792 20" class="blueprint-border" />
  <path d="M 8 192 L 20 192 M 8 192 L 8 180" class="blueprint-border" />
  <path d="M 792 192 L 780 192 M 792 192 L 792 180" class="blueprint-border" />

  <!-- Interactive Node Groups -->
  <!-- Node A: AI -->
  <g class="node-group" id="ng-ai" transform="translate(0, 0)">
    <circle cx="150" cy="70" r="22" class="node-bg" />
    <text x="150" y="74" class="node-label">AI</text>
    <text x="400" y="160" class="info-text">&gt; AI: INTEGRATING TENSORS, MODEL CASCADE FALLBACKS, AND AGENT WORKFLOWS</text>
  </g>

  <!-- Node B: Backend -->
  <g class="node-group" id="ng-backend" transform="translate(0, 0)">
    <circle cx="275" cy="70" r="22" class="node-bg" />
    <text x="275" y="74" class="node-label">BACKEND</text>
    <text x="400" y="160" class="info-text" fill="#6366f1">&gt; BACKEND: LOW-LATENCY REST, WEBSOCKET STREAMS, AND WEBRTC CHANNELS</text>
  </g>

  <!-- Node C: DB -->
  <g class="node-group" id="ng-db" transform="translate(0, 0)">
    <circle cx="400" cy="70" r="22" class="node-bg" />
    <text x="400" y="74" class="node-label">DATASTORE</text>
    <text x="400" y="160" class="info-text" fill="#6366f1">&gt; DATASTORE: TRANSACTION SCALING, CACHE LAYERING, AND VECTOR DATABASES</text>
  </g>

  <!-- Node D: UI -->
  <g class="node-group" id="ng-ui" transform="translate(0, 0)">
    <circle cx="525" cy="70" r="22" class="node-bg" />
    <text x="525" y="74" class="node-label">SURFACE</text>
    <text x="400" y="160" class="info-text" fill="#ffffff">&gt; SURFACE: NEXT.JS APP CHOREOGRAPHY, THREE.JS, AND WEBGL VIEWPORT SCENES</text>
  </g>

  <!-- Node E: Motion -->
  <g class="node-group" id="ng-motion" transform="translate(0, 0)">
    <circle cx="650" cy="70" r="22" class="node-bg" />
    <text x="650" y="74" class="node-label">MOTION</text>
    <text x="400" y="160" class="info-text">&gt; MOTION: COMMUNICATIONS THROUGH EXPLAINABLE PHYSICS AND SYSTEM TRANSITIONS</text>
  </g>

  <!-- Connection Lines (Placed after groups for sibling selector support) -->
  <line x1="172" y1="70" x2="253" y2="70" class="connection-line l-ab" />
  <line x1="297" y1="70" x2="378" y2="70" class="connection-line l-bc" />
  <line x1="422" y1="70" x2="503" y2="70" class="connection-line l-cd" />
  <line x1="547" y1="70" x2="628" y2="70" class="connection-line l-de" />

  <!-- Info Panel Display Board and Default Text -->
  <rect x="150" y="140" width="500" height="32" fill="#050508" stroke="rgba(255, 255, 255, 0.08)" rx="4" style="pointer-events: none;" />
  <text x="400" y="160" class="info-text-default">&gt; HOVER OVER ANY NODE TO INSPECT EXPERTISE PARAMETERS</text>

  <!-- Technical Details -->
  <text x="20" y="196" font-family="ui-monospace, SFMono-Regular, monospace" font-size="8px" fill="rgba(255, 255, 255, 0.3)">LOC: 12.97° N, 80.24° E</text>
  <text x="780" y="196" text-anchor="end" font-family="ui-monospace, SFMono-Regular, monospace" font-size="8px" fill="rgba(255, 255, 255, 0.3)">SYSTEM_STATE: STABLE</text>
</svg>
