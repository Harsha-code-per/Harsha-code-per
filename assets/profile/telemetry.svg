<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260" fill="none">
  <style>
  <![CDATA[
    .case-bg {
      fill: #09090d;
      stroke: #1e1e2f;
      stroke-width: 3;
    }
    .plate-bg {
      fill: #030305;
      stroke: rgba(255, 255, 255, 0.03);
      stroke-width: 1;
    }
    .key-base {
      fill: #16161e;
      rx: 4px;
    }
    .key-top {
      fill: #272730;
      rx: 3px;
      transition: all 0.1s ease;
    }
    .key-top-accent {
      fill: #1f2937;
    }
    .key-top-esc {
      fill: #008b8b;
    }
    .key-top-enter {
      fill: #4c1d95;
    }
    .key-legend {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 8px;
      font-weight: bold;
      fill: #71717a;
      pointer-events: none;
    }
    .key-legend-accent {
      fill: #00f2fe;
    }
    .key-legend-enter {
      fill: #c084fc;
    }
    
    /* RGB Underglow Backlight */
    .switch-glow {
      fill: url(#rgb-glow);
      opacity: 0;
      pointer-events: none;
    }

    /* Animation Keyframes */
    @keyframes press-key {
      0%, 100% {
        transform: translateY(0);
      }
      1.5% {
        transform: translateY(2px);
      }
      3% {
        transform: translateY(0);
      }
    }
    @keyframes led-glow {
      0%, 100% {
        opacity: 0;
      }
      1.5% {
        opacity: 0.85;
      }
      3% {
        opacity: 0;
      }
    }

    /* Assigning Delays to Keys to make a Typing Pattern */
    .key-q-anim { animation: press-key 8s infinite 0.4s; }
    .glow-q-anim { animation: led-glow 8s infinite 0.4s; }

    .key-w-anim { animation: press-key 8s infinite 0.8s; }
    .glow-w-anim { animation: led-glow 8s infinite 0.8s; }

    .key-e-anim { animation: press-key 8s infinite 1.2s; }
    .glow-e-anim { animation: led-glow 8s infinite 1.2s; }

    .key-r-anim { animation: press-key 8s infinite 1.6s; }
    .glow-r-anim { animation: led-glow 8s infinite 1.6s; }

    .key-t-anim { animation: press-key 8s infinite 2.0s; }
    .glow-t-anim { animation: led-glow 8s infinite 2.0s; }

    .key-space-anim { animation: press-key 8s infinite 2.4s; }
    .glow-space-anim { animation: led-glow 8s infinite 2.4s; }

    .key-a-anim { animation: press-key 8s infinite 3.0s; }
    .glow-a-anim { animation: led-glow 8s infinite 3.0s; }

    .key-s-anim { animation: press-key 8s infinite 3.4s; }
    .glow-s-anim { animation: led-glow 8s infinite 3.4s; }

    .key-d-anim { animation: press-key 8s infinite 3.8s; }
    .glow-d-anim { animation: led-glow 8s infinite 3.8s; }

    .key-f-anim { animation: press-key 8s infinite 4.2s; }
    .glow-f-anim { animation: led-glow 8s infinite 4.2s; }

    .key-enter-anim { animation: press-key 8s infinite 4.8s; }
    .glow-enter-anim { animation: led-glow 8s infinite 4.8s; }

  ]]>
  </style>

