<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160" fill="none">
  <style>
    .grid { stroke: rgba(255, 255, 255, 0.015); stroke-width: 0.8; }
    .axis { stroke: rgba(255, 255, 255, 0.08); stroke-width: 1; }
    .timeline-path { stroke: rgba(94, 106, 210, 0.25); stroke-width: 1.5; stroke-dasharray: 4 4; }
    .active-path { stroke: #00f2fe; stroke-width: 1.5; }
    .node-base { fill: #050508; stroke: rgba(255, 255, 255, 0.15); stroke-width: 1; }
    .node-active { fill: #050508; stroke: #00f2fe; stroke-width: 1.5; filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.4)); }
    .node-text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 10px; fill: #71717a; }
    .node-text-active { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 10px; fill: #ffffff; font-weight: bold; }
    .descr-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 9px; fill: #71717a; }
    @keyframes pulse {
      0%, 100% { r: 3; opacity: 0.4; }
      50% { r: 6; opacity: 1; }
    }
    .pulse-dot { fill: #00f2fe; animation: pulse 2s infinite; }
  </style>
  
  <rect width="800" height="160" fill="#050508" stroke="rgba(255,255,255,0.04)" rx="6" />

  <!-- Graph Paper Grid -->
  <g>
    <line x1="40" y1="0" x2="40" y2="160" class="grid" />
    <line x1="80" y1="0" x2="80" y2="160" class="grid" />
    <line x1="120" y1="0" x2="120" y2="160" class="grid" />
    <line x1="160" y1="0" x2="160" y2="160" class="grid" />
    <line x1="200" y1="0" x2="200" y2="160" class="grid" />
    <line x1="240" y1="0" x2="240" y2="160" class="grid" />
    <line x1="280" y1="0" x2="280" y2="160" class="grid" />
    <line x1="320" y1="0" x2="320" y2="160" class="grid" />
    <line x1="360" y1="0" x2="360" y2="160" class="grid" />
    <line x1="400" y1="0" x2="400" y2="160" class="grid" />
    <line x1="440" y1="0" x2="440" y2="160" class="grid" />
    <line x1="480" y1="0" x2="480" y2="160" class="grid" />
    <line x1="520" y1="0" x2="520" y2="160" class="grid" />
    <line x1="560" y1="0" x2="560" y2="160" class="grid" />
    <line x1="600" y1="0" x2="600" y2="160" class="grid" />
    <line x1="640" y1="0" x2="640" y2="160" class="grid" />
    <line x1="680" y1="0" x2="680" y2="160" class="grid" />
    <line x1="720" y1="0" x2="720" y2="160" class="grid" />
    <line x1="760" y1="0" x2="760" y2="160" class="grid" />
    
    <line x1="0" y1="20" x2="800" y2="20" class="grid" />
    <line x1="0" y1="40" x2="800" y2="40" class="grid" />
    <line x1="0" y1="60" x2="800" y2="60" class="grid" />
    <line x1="0" y1="80" x2="800" y2="80" class="grid" />
    <line x1="0" y1="100" x2="800" y2="100" class="grid" />
    <line x1="0" y1="120" x2="800" y2="120" class="grid" />
    <line x1="0" y1="140" x2="800" y2="140" class="grid" />
  </g>

  <!-- Technical Axis and Rulers -->
  <line x1="40" y1="80" x2="760" y2="80" class="axis" />
  <line x1="40" y1="75" x2="40" y2="85" class="axis" />
  <line x1="760" y1="75" x2="760" y2="85" class="axis" />

  <!-- Timeline paths -->
  <line x1="40" y1="80" x2="260" y2="80" class="active-path" />
  <line x1="260" y1="80" x2="500" y2="80" class="timeline-path" />
  <line x1="500" y1="80" x2="760" y2="80" class="timeline-path" />

  <!-- NOW NODE (Coordinates 260, 80) -->
  <g>
    <line x1="260" y1="40" x2="260" y2="120" stroke="rgba(0, 242, 254, 0.15)" stroke-width="1" />
    <circle cx="260" cy="80" r="8" class="node-active" />
    <circle cx="260" cy="80" r="3" class="pulse-dot" />
    <text x="260" y="32" text-anchor="middle" class="node-text-active">[ NOW ]</text>
    <text x="260" y="105" text-anchor="middle" class="node-text-active" fill="#00f2fe">ACTIVE EXPLORATION</text>
    <text x="260" y="120" text-anchor="middle" class="descr-text">Billytics Core &amp; DeV Platform Architecture</text>
  </g>

  <!-- NEXT NODE (Coordinates 500, 80) -->
  <g>
    <line x1="500" y1="40" x2="500" y2="120" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    <circle cx="500" cy="80" r="6" class="node-base" />
    <circle cx="500" cy="80" r="2" fill="#71717a" />
    <text x="500" y="32" text-anchor="middle" class="node-text">[ NEXT ]</text>
    <text x="500" y="105" text-anchor="middle" class="node-text">INTERACTIVE CANVASES</text>
    <text x="500" y="120" text-anchor="middle" class="descr-text">Long-term Memory &amp; Collaborative Canvases</text>
  </g>

  <!-- EVENTUALLY NODE (Coordinates 700, 80) -->
  <g>
    <line x1="700" y1="40" x2="700" y2="120" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    <circle cx="700" cy="80" r="6" class="node-base" />
    <circle cx="700" cy="80" r="2" fill="#71717a" />
    <text x="700" y="32" text-anchor="middle" class="node-text">[ EVENTUALLY ]</text>
    <text x="700" y="105" text-anchor="middle" class="node-text">AMBIENT SYSTEMS</text>
    <text x="700" y="120" text-anchor="middle" class="descr-text">Self-Adapting UI &amp; Predictor Models</text>
  </g>

  <!-- Technical Annotation Details -->
  <text x="45" y="70" class="descr-text" font-size="8px" fill="rgba(255, 255, 255, 0.25)">SYS_EXPLORATION_VECTOR // EST. 2026</text>
  <text x="755" y="70" text-anchor="end" class="descr-text" font-size="8px" fill="rgba(255, 255, 255, 0.25)">COORD_SYS: EPSILON</text>
</svg>
