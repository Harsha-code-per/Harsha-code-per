<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220" fill="none">
  <style>
    .grid { stroke: rgba(255, 255, 255, 0.015); stroke-width: 0.8; }
    .panel {
      fill: #050508;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 1;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .panel:hover {
      stroke: var(--hover-stroke, #5e6ad2);
      fill: rgba(94, 106, 210, 0.02);
      filter: drop-shadow(0 0 8px rgba(94, 106, 210, 0.15));
    }
    .panel-cyan:hover {
      stroke: #00f2fe;
      fill: rgba(0, 242, 254, 0.02);
      filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.15));
    }
    .panel-white:hover {
      stroke: #ffffff;
      fill: rgba(255, 255, 255, 0.02);
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.15));
    }
    .title {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      font-weight: bold;
      fill: #71717a;
      letter-spacing: 1px;
      transition: fill 0.3s ease;
    }
    .panel:hover .title {
      fill: var(--hover-title, #ffffff);
    }
    .item {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      fill: #52525b;
      transition: fill 0.3s ease, transform 0.3s ease;
      cursor: pointer;
    }
    .panel:hover .item {
      fill: #e4e4e7;
    }
    .panel:hover .item:hover {
      fill: var(--hover-item-glow, #00f2fe);
      transform: translateX(3px);
    }
    .meta-text {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 8px;
      fill: rgba(255, 255, 255, 0.1);
      transition: fill 0.3s ease;
    }
    .panel:hover .meta-text {
      fill: rgba(255, 255, 255, 0.35);
    }
  </style>

  <rect width="800" height="220" fill="#050508" stroke="rgba(255, 255, 255, 0.04)" rx="6" />
  
  <line x1="200" y1="0" x2="200" y2="220" class="grid" stroke-dasharray="2 4" />
  <line x1="400" y1="0" x2="400" y2="220" class="grid" stroke-dasharray="2 4" />
  <line x1="600" y1="0" x2="600" y2="220" class="grid" stroke-dasharray="2 4" />

  <!-- Column 1: AI & INTELLIGENCE -->
  <g>
    <rect x="10" y="10" width="180" height="200" class="panel panel-cyan" rx="4" style="--hover-stroke: #00f2fe; --hover-title: #00f2fe; --hover-item-glow: #00f2fe;" />
    <text x="25" y="38" class="title">01 // AI_SYSTEMS</text>
    <text x="25" y="70" class="item">• PyTorch</text>
    <text x="25" y="95" class="item">• Agentic Frameworks</text>
    <text x="25" y="120" class="item">• Model Cascades</text>
    <text x="25" y="145" class="item">• Vector Databases</text>
    <text x="25" y="190" class="meta-text">TENSOR_COMPUTE: ACTIVE</text>
  </g>

  <!-- Column 2: BACKEND SYSTEMS -->
  <g>
    <rect x="210" y="10" width="180" height="200" class="panel" rx="4" style="--hover-stroke: #5e6ad2; --hover-title: #5e6ad2; --hover-item-glow: #5e6ad2;" />
    <text x="225" y="38" class="title">02 // BACKEND</text>
    <text x="225" y="70" class="item">• TypeScript / Node.js</text>
    <text x="225" y="95" class="item">• Python / FastAPI</text>
    <text x="225" y="120" class="item">• WebSockets / WebRTC</text>
    <text x="225" y="145" class="item">• Distributed Streams</text>
    <text x="225" y="190" class="meta-text">CONCURRENCY: OPTIMIZED</text>
  </g>

  <!-- Column 3: SURFACES -->
  <g>
    <rect x="410" y="10" width="180" height="200" class="panel panel-white" rx="4" style="--hover-stroke: #ffffff; --hover-title: #ffffff; --hover-item-glow: #00f2fe;" />
    <text x="425" y="38" class="title">03 // INTERFACES</text>
    <text x="425" y="70" class="item">• Next.js / React</text>
    <text x="425" y="95" class="item">• Three.js / WebGL</text>
    <text x="425" y="120" class="item">• GSAP / Framer Motion</text>
    <text x="425" y="145" class="item">• Canvas Rendering</text>
    <text x="425" y="190" class="meta-text">DRAW_PIPELINE: ACCEL</text>
  </g>

  <!-- Column 4: DATA LAYER -->
  <g>
    <rect x="610" y="10" width="180" height="200" class="panel" rx="4" style="--hover-stroke: #5e6ad2; --hover-title: #5e6ad2; --hover-item-glow: #5e6ad2;" />
    <text x="625" y="38" class="title">04 // INFRASTRUCTURE</text>
    <text x="625" y="70" class="item">• PostgreSQL</text>
    <text x="625" y="95" class="item">• Redis Caching</text>
    <text x="625" y="120" class="item">• IndexedDB Offline</text>
    <text x="625" y="145" class="item">• Docker Containers</text>
    <text x="625" y="190" class="meta-text">VOLUMETRIC_STORE: SECURE</text>
  </g>
</svg>
